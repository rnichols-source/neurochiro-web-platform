<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NeuroChiro Network Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0B1118; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background: #0B1118; }
        
        .custom-marker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
            background: #D66829;
            box-shadow: 0 0 15px rgba(214, 104, 41, 0.6);
            cursor: pointer;
            position: relative;
        }

        /* Larger tap area for mobile */
        .custom-marker::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 50%;
            background: transparent;
        }
        
        /* Cluster Styling */
        .cluster-marker {
            background: rgba(214, 104, 41, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            box-shadow: 0 0 20px rgba(214, 104, 41, 0.4);
            cursor: pointer;
            backdrop-blur: 4px;
        }

        .pulse {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(214, 104, 41, 0.4);
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        tap: true,
        touchZoom: true,
        dragging: true
    }).setView([38, -98], 4);

    // Primary Tile Layer (Dark Mode)
    const cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 20
    });

    // Fallback Tile Layer (Standard OSM) if CartoDB fails
    const osmLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    });

    cartoLayer.on('tileerror', function() {
        console.warn("CartoDB tiles failed to load, falling back to OSM");
        map.removeLayer(cartoLayer);
        osmLayer.addTo(map);
    });

    cartoLayer.addTo(map);

    let markers = [];

    function notifyParent() {
        const bounds = map.getBounds();
        const zoom = map.getZoom();
        const west = bounds.getWest();
        const south = bounds.getSouth();
        const east = bounds.getEast();
        const north = bounds.getNorth();
        
        window.parent.postMessage({
            type: 'map-move',
            bounds: [west, south, east, north],
            zoom: zoom
        }, '*');
    }

    map.on('moveend', notifyParent);
    
    // Initial notification
    setTimeout(notifyParent, 500);

    function updateMarkers(clusters) {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        clusters.forEach(feature => {
            const [longitude, latitude] = feature.geometry.coordinates;
            const { cluster, point_count, name, clinic, doctorId } = feature.properties;

            if (cluster) {
                // Render Cluster
                const size = point_count < 10 ? 30 : point_count < 50 ? 40 : 50;
                const icon = L.divIcon({
                    html: `<div class="cluster-marker" style="width: ${size}px; height: ${size}px; font-size: ${size/3}px;">${point_count}</div>`,
                    className: '',
                    iconSize: [size, size]
                });

                const marker = L.marker([latitude, longitude], { icon }).addTo(map);
                marker.on('click', () => {
                    const zoom = map.getZoom();
                    map.setView([latitude, longitude], zoom + 2);
                });
                markers.push(marker);
            } else {
                // Render Individual Point
                const icon = L.divIcon({
                    className: '',
                    html: `<div class="custom-marker"><div class="pulse"></div></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([latitude, longitude], { icon }).addTo(map);
                marker.on('click', () => {
                    window.parent.postMessage({ 
                        type: 'marker-click', 
                        data: feature.properties 
                    }, '*');
                });
                markers.push(marker);
            }
        });
    }

    window.addEventListener('message', (e) => {
        if (e.data.type === 'update-clusters') {
            updateMarkers(e.data.data);
        }
    });
</script>
</body>
</html>
