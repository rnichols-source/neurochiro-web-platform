<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NeuroChiro Network Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }

        /* Apple Maps style popups */
        .maplibregl-popup { max-width: 280px !important; z-index: 10; }
        .maplibregl-popup-content {
            background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; padding: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.06); overflow: hidden;
        }
        .maplibregl-popup-close-button {
            font-size: 20px; color: #999; right: 8px; top: 8px; width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(0,0,0,0.05);
        }
        .maplibregl-popup-close-button:hover { background: rgba(0,0,0,0.1); }
        .maplibregl-popup-tip { border-top-color: rgba(255,255,255,0.98) !important; }
        .popup-card { padding: 16px; }
        .popup-card .doctor-name { font-size: 16px; font-weight: 700; color: #1E2D3B; margin-bottom: 2px; }
        .popup-card .clinic-name { font-size: 13px; color: #666; margin-bottom: 4px; }
        .popup-card .location { font-size: 12px; color: #999; display: flex; align-items: center; gap: 4px; margin-bottom: 12px; }
        .popup-card .view-btn {
            display: block; width: 100%; padding: 10px 16px; background: #D66829; color: white;
            border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
            text-align: center; text-decoration: none; transition: background 0.2s;
        }
        .popup-card .view-btn:hover { background: #c05a22; }

        .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right { display: none !important; }
        .maplibregl-ctrl-group {
            background: rgba(255,255,255,0.92) !important; backdrop-filter: blur(20px) !important;
            border-radius: 12px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06) !important;
            border: none !important; overflow: hidden !important;
        }
        .maplibregl-ctrl-group button { width: 44px !important; height: 44px !important; }
        .maplibregl-ctrl-group button + button { border-top: 1px solid rgba(0,0,0,0.06) !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
(function() {
    var activePopup = null;
    var selectedDoctorId = null;
    var pendingFeatures = null;
    var layersReady = false;

    var map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'carto-dark': {
                    type: 'raster',
                    tiles: [
                        'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
                        'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
                        'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'
                    ],
                    tileSize: 256,
                    attribution: ''
                },
                'carto-light': {
                    type: 'raster',
                    tiles: [
                        'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png',
                        'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png',
                        'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png'
                    ],
                    tileSize: 256,
                    attribution: ''
                }
            },
            layers: [{
                id: 'carto-base-layer',
                type: 'raster',
                source: window.innerWidth < 1024 ? 'carto-dark' : 'carto-light',
                minzoom: 0,
                maxzoom: 20
            }],
            glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
        },
        center: [-98, 38],
        zoom: 4,
        maxPitch: 60,
        attributionControl: false
    });

    // Only show zoom controls on desktop — mobile uses pinch to zoom like Apple Maps
    var isMobile = window.innerWidth < 1024;
    if (!isMobile) {
        map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
    }
    map.addControl(new maplibregl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: false
    }), 'top-right');

    // ── Popup helper ──
    function createPopupHtml(props) {
        var name = props.name || 'Specialist';
        var clinic = props.clinic || '';
        var loc = [props.city || '', props.state || ''].filter(Boolean).join(', ');
        var slug = props.slug || '';
        var html = '<div class="popup-card">';
        html += '<div class="doctor-name">' + name + '</div>';
        if (clinic) html += '<div class="clinic-name">' + clinic + '</div>';
        if (loc) html += '<div class="location"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#D66829" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + loc + '</div>';
        if (slug) html += '<a class="view-btn" href="/directory/' + slug + '" target="_top">View Profile</a>';
        html += '</div>';
        return html;
    }

    // ── Setup GL layers (called once on map load) ──
    function setupLayers() {
        // Simple GeoJSON source — no clustering (157 docs is fine without it)
        map.addSource('doctors', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: [] }
        });

        // Doctor dots — scale with zoom to prevent overlap at low zoom
        map.addLayer({
            id: 'doctor-dots',
            type: 'circle',
            source: 'doctors',
            paint: {
                'circle-color': '#D66829',
                'circle-radius': [
                    'interpolate', ['linear'], ['zoom'],
                    3, 4,     // zoom 3 → 4px
                    6, 6,     // zoom 6 → 6px
                    10, 8,    // zoom 10 → 8px
                    14, 10    // zoom 14 → 10px
                ],
                'circle-stroke-width': [
                    'interpolate', ['linear'], ['zoom'],
                    3, 1.5,
                    10, 2.5
                ],
                'circle-stroke-color': '#ffffff',
                'circle-opacity': 1,
                'circle-stroke-opacity': 1
            }
        });

        layersReady = true;
        console.log('[MAP] Layers ready, source added');

        // ── Interactions ──

        // Click doctor dot → popup + notify parent
        map.on('click', 'doctor-dots', function(e) {
            if (!e.features || !e.features.length) return;
            var feature = e.features[0];
            var coords = feature.geometry.coordinates.slice();
            var props = feature.properties;

            selectedDoctorId = props.doctorId;

            if (activePopup) activePopup.remove();
            activePopup = new maplibregl.Popup({ offset: 14, closeButton: true, closeOnClick: true, maxWidth: '280px', focusAfterOpen: false })
                .setLngLat(coords)
                .setHTML(createPopupHtml(props))
                .addTo(map);
            activePopup.on('close', function() { activePopup = null; });

            map.flyTo({ center: coords, zoom: Math.max(map.getZoom(), 12), duration: 600 });

            window.parent.postMessage({
                type: 'marker-click',
                data: {
                    doctorId: props.doctorId,
                    name: props.name,
                    slug: props.slug,
                    clinic: props.clinic,
                    city: props.city,
                    state: props.state,
                    photo_url: props.photo_url || ''
                }
            }, window.location.origin);
        });

        // Click empty space → deselect
        map.on('click', function(e) {
            var hits = map.queryRenderedFeatures(e.point, { layers: ['doctor-dots'] });
            if (hits.length === 0 && selectedDoctorId) {
                selectedDoctorId = null;
                if (activePopup) { activePopup.remove(); activePopup = null; }
                window.parent.postMessage({ type: 'marker-deselect' }, window.location.origin);
            }
        });

        // Cursor
        ['doctor-dots'].forEach(function(layer) {
            map.on('mouseenter', layer, function() { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', layer, function() { map.getCanvas().style.cursor = ''; });
        });
    }

    // ── Data management ──
    function setFeatures(features) {
        console.log('[MAP] setFeatures called with', features.length, 'features');
        pendingFeatures = features;
        if (!layersReady) {
            console.log('[MAP] Layers not ready, features queued');
            return;
        }
        if (features.length === 0) {
            window.parent.postMessage({ type: 'map-empty' }, window.location.origin);
        }
        try {
            var source = map.getSource('doctors');
            if (source) {
                source.setData({ type: 'FeatureCollection', features: features });
                console.log('[MAP] Source data updated');
            } else {
                console.error('[MAP] Source "doctors" not found');
            }
        } catch (err) {
            console.error('[MAP] setData error:', err);
        }
    }

    function fitToFeatures(features) {
        if (!features || features.length === 0) return;
        if (features.length === 1) {
            map.flyTo({ center: features[0].geometry.coordinates, zoom: 13, duration: 1200, essential: true });
            return;
        }
        var bounds = new maplibregl.LngLatBounds();
        features.forEach(function(f) { bounds.extend(f.geometry.coordinates); });
        map.fitBounds(bounds, { padding: { top: 80, bottom: 80, left: 60, right: 60 }, maxZoom: 14, duration: 1200 });
    }

    function flyToDoctor(doctorId) {
        if (!pendingFeatures) return;
        var id = String(doctorId);
        for (var i = 0; i < pendingFeatures.length; i++) {
            var f = pendingFeatures[i];
            if (f.properties && String(f.properties.doctorId) === id) {
                selectedDoctorId = id;
                var coords = f.geometry.coordinates;
                map.flyTo({ center: coords, zoom: Math.max(map.getZoom(), 13), duration: 800, essential: true });

                if (activePopup) activePopup.remove();
                activePopup = new maplibregl.Popup({ offset: 14, closeButton: true, closeOnClick: true, maxWidth: '280px', focusAfterOpen: false })
                    .setLngLat(coords).setHTML(createPopupHtml(f.properties)).addTo(map);
                activePopup.on('close', function() { activePopup = null; });

                window.parent.postMessage({ type: 'marker-click', data: f.properties }, window.location.origin);
                return;
            }
        }
    }

    // ── Self-load doctors from API ──
    function loadDoctors() {
        console.log('[MAP] loadDoctors called');
        fetch('/api/directory/search?q=&limit=500')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var doctors = data.doctors || [];
                console.log('[MAP] API returned', doctors.length, 'doctors');
                var features = [];
                doctors.forEach(function(d) {
                    var lat = Number(d.latitude);
                    var lng = Number(d.longitude);
                    if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;
                    if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return;
                    features.push({
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [lng, lat] },
                        properties: {
                            doctorId: String(d.id),
                            name: 'Dr. ' + (d.first_name || '') + ' ' + (d.last_name || ''),
                            slug: d.slug || '',
                            clinic: d.clinic_name || '',
                            city: d.city || '',
                            state: d.state || '',
                            photo_url: d.photo_url || '',
                            matched: 1
                        }
                    });
                });
                console.log('[MAP] Built', features.length, 'valid features');
                setFeatures(features);
                fitToFeatures(features);
            })
            .catch(function(err) {
                console.error('[MAP] Load failed:', err);
                window.parent.postMessage({ type: 'map-error', error: 'Failed to load doctors' }, window.location.origin);
            });
    }

    function reportReady() {
        window.parent.postMessage({ type: 'map-ready' }, window.location.origin);
    }

    // ── Map load ──
    map.on('load', function() {
        console.log('[MAP] Map loaded');
        setupLayers();
        reportReady();

        // Push any features that arrived before map was ready
        if (pendingFeatures && pendingFeatures.length > 0) {
            console.log('[MAP] Flushing', pendingFeatures.length, 'pending features');
            setFeatures(pendingFeatures);
            fitToFeatures(pendingFeatures);
        }

        // Data is sent by parent via postMessage — no self-loading
    });

    // ── PostMessage from parent ──
    window.addEventListener('message', function(e) {
        var d = e.data;
        if (!d || !d.type) return;

        switch (d.type) {
            case 'is-ready':
                reportReady();
                break;

            case 'force-raw-markers':
                var features = d.data || [];
                console.log('[MAP] Received force-raw-markers with', features.length, 'features');
                if (features.length > 0) {
                    setFeatures(features);
                    fitToFeatures(features);
                }
                break;

            case 'update-markers':
                var updatedFeatures = d.data || [];
                console.log('[MAP] Received update-markers with', updatedFeatures.length, 'features');
                if (updatedFeatures.length > 0) {
                    setFeatures(updatedFeatures);
                    // No fitToFeatures — keep current view
                }
                break;

            case 'set-view':
                if (d.center && d.center[0] !== undefined) {
                    map.flyTo({ center: [d.center[0], d.center[1]], zoom: d.zoom, duration: 1200, essential: true });
                }
                break;

            case 'select-marker':
                flyToDoctor(d.doctorId);
                break;

            case 'deselect-marker':
                selectedDoctorId = null;
                if (activePopup) { activePopup.remove(); activePopup = null; }
                break;
        }
    });
})();
</script>
</body>
</html>
