<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NeuroChiro Network Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0B1118; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background: #0B1118; }
        
        @keyframes pulse-animation {
            0% { stroke-width: 2; stroke-opacity: 1; }
            50% { stroke-width: 15; stroke-opacity: 0; }
            100% { stroke-width: 2; stroke-opacity: 1; }
        }

        .active-specialist-marker {
            animation: pulse-animation 2s infinite;
        }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    var map;
    var markerLayer;
    
    console.log("[MAP_IFRAME] Initializing Leaflet...");
    
    map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        preferCanvas: false // Use SVG for easier pulsing/styling
    }).setView([38, -98], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    window.markerLayer = L.featureGroup().addTo(map);

    function reportReady() {
        console.log("[MAP_IFRAME] Map is Ready");
        window.parent.postMessage({ type: 'map-ready' }, '*');
    }

    map.whenReady(reportReady);

    window.addEventListener('message', (e) => {
        if (e.data.type === 'is-ready') {
            reportReady();
        } else if (e.data.type === 'force-raw-markers') {
            const features = e.data.data || [];
            console.log('[MAP_IFRAME] Syncing markers:', features.length);
            window.markerLayer.clearLayers();
            
            const activeMarkers = [];

            features.forEach((feat) => {
                if (!feat.geometry || !feat.geometry.coordinates) return;
                const [lng, lat] = feat.geometry.coordinates;
                const isFiltered = feat.properties.isFiltered;
                
                if (!isNaN(lat) && !isNaN(lng) && lat !== 0) {
                    const marker = L.circleMarker([lat, lng], {
                        radius: isFiltered ? 10 : 5,
                        fillColor: isFiltered ? "#ff5722" : "#444",
                        color: isFiltered ? "#fff" : "#888",
                        weight: isFiltered ? 2 : 1,
                        opacity: 1,
                        fillOpacity: isFiltered ? 0.9 : 0.5,
                        className: isFiltered ? 'active-specialist-marker' : ''
                    }).addTo(window.markerLayer).bindPopup(feat.properties.name || "Specialist");
                    
                    if (isFiltered) activeMarkers.push(marker);
                }
            });

            try {
                if (activeMarkers.length > 0) {
                    const activeGroup = L.featureGroup(activeMarkers);
                    map.fitBounds(activeGroup.getBounds(), { padding: [100, 100], maxZoom: 10 });
                } else {
                    const bounds = window.markerLayer.getBounds();
                    if (bounds.isValid()) {
                        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 6 });
                    }
                }
            } catch (err) {
                console.error('[MAP_IFRAME] fitBounds error:', err);
            }
        } else if (e.data.type === 'set-view') {
            const { center, zoom } = e.data;
            if (center && center[0] !== undefined) {
                map.setView([center[1], center[0]], zoom);
            }
        }
    });
</script>
</body>
</html>
