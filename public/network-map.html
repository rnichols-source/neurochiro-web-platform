<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NeuroChiro Network Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0B1118; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background: #0B1118; }
        
        .custom-marker {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid white;
            background: #D66829;
            box-shadow: 0 0 20px rgba(214, 104, 41, 0.8);
            cursor: pointer;
            position: relative;
            z-index: 9999 !important;
        }

        .cluster-marker {
            background: rgba(214, 104, 41, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            box-shadow: 0 0 20px rgba(214, 104, 41, 0.4);
            cursor: pointer;
            backdrop-filter: blur(4px);
            z-index: 9998 !important;
        }

        .pulse {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(214, 104, 41, 0.4);
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="error-banner" style="display:none; position:fixed; top:0; left:0; right:0; background:rgba(255,0,0,0.8); color:white; padding:10px; z-index:9999; font-family:sans-serif; font-size:12px;"></div>
<script>
    // Error Reporting
    window.onerror = function(msg, url, line) {
        const errorMsg = `Map Error: ${msg} at ${url}:${line}`;
        console.error(errorMsg);
        window.parent.postMessage({ type: 'map-error', error: errorMsg }, '*');
    };

    console.log("[MAP_IFRAME] Initializing Optimized Leaflet...");
    
    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        tap: true,
        touchZoom: true,
        dragging: true,
        preferCanvas: true // Use canvas for smoother rendering
    }).setView([38, -98], 4);

    // Primary Tile Layer (Dark Mode)
    const cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 20,
        updateWhenIdle: true, // Only update tiles when zooming/panning stops
        updateWhenZooming: false
    });

    cartoLayer.addTo(map);

    window.parent.postMessage({ type: 'map-ready' }, '*');

    let markers = [];
    let moveTimeout;

    function notifyParent() {
        if (moveTimeout) clearTimeout(moveTimeout);
        
        // Debounce to prevent too many DB calls during rapid panning
        moveTimeout = setTimeout(() => {
            const bounds = map.getBounds();
            const zoom = map.getZoom();
            
            window.parent.postMessage({
                type: 'map-move',
                bounds: [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()],
                zoom: zoom
            }, '*');
        }, 150);
    }

    map.on('moveend', notifyParent);
    
    function updateMarkers(clusters) {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        const fragment = [];
        clusters.forEach(feature => {
            const [longitude, latitude] = feature.geometry.coordinates;
            const { cluster, point_count } = feature.properties;

            if (cluster) {
                const size = point_count < 10 ? 30 : point_count < 50 ? 40 : 50;
                const icon = L.divIcon({
                    html: `<div class="cluster-marker" style="width: ${size}px; height: ${size}px; font-size: ${size/3}px;">${point_count}</div>`,
                    className: '',
                    iconSize: [size, size]
                });

                const marker = L.marker([latitude, longitude], { icon }).addTo(map);
                marker.on('click', () => map.setView([latitude, longitude], map.getZoom() + 2));
                markers.push(marker);
            } else {
                const icon = L.divIcon({
                    className: '',
                    html: `<div class="custom-marker"><div class="pulse"></div></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([latitude, longitude], { icon }).addTo(map);
                marker.on('click', () => {
                    window.parent.postMessage({ 
                        type: 'marker-click', 
                        data: feature.properties 
                    }, '*');
                });
                markers.push(marker);
            }
        });
    }

    window.addEventListener('message', (e) => {
        if (e.data.type === 'update-clusters') {
            updateMarkers(e.data.data);
        } else if (e.data.type === 'set-view') {
            const { center, zoom } = e.data;
            map.setView([center[1], center[0]], zoom);
        } else if (e.data.type === 'fit-bounds') {
            const { bounds, padding } = e.data;
            map.fitBounds(bounds, { padding: padding || [50, 50] });
        }
    });
</script>
</body>
</html>
