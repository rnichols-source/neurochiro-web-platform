<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NeuroChiro Network Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0B1118; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; background: #0B1118; }

        @keyframes pulse-animation {
            0% { stroke-width: 2; stroke-opacity: 1; }
            50% { stroke-width: 15; stroke-opacity: 0; }
            100% { stroke-width: 2; stroke-opacity: 1; }
        }

        .active-specialist-marker {
            animation: pulse-animation 2s infinite;
        }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    var map;
    var markerLayer;

    map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        preferCanvas: false
    }).setView([38, -98], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    window.markerLayer = L.featureGroup().addTo(map);

    function reportReady() {
        window.parent.postMessage({ type: 'map-ready' }, '*');
    }

    function renderMarkers(features) {
        window.markerLayer.clearLayers();
        var activeMarkers = [];
        var hasAnyFiltered = features.some(function(f) { return f.properties && f.properties.isFiltered; });

        features.forEach(function(feat) {
            if (!feat.geometry || !feat.geometry.coordinates) return;
            var lng = feat.geometry.coordinates[0];
            var lat = feat.geometry.coordinates[1];
            var isActive = hasAnyFiltered ? feat.properties.isFiltered : true;

            if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
                var marker = L.circleMarker([lat, lng], {
                    radius: isActive ? 8 : 4,
                    fillColor: isActive ? "#ff5722" : "#666",
                    color: isActive ? "#fff" : "#999",
                    weight: isActive ? 2 : 1,
                    opacity: 1,
                    fillOpacity: isActive ? 0.9 : 0.4,
                    className: isActive ? 'active-specialist-marker' : ''
                }).addTo(window.markerLayer).bindPopup(feat.properties.name || "Specialist");

                if (isActive) activeMarkers.push(marker);
            }
        });

        try {
            if (activeMarkers.length > 0) {
                var activeGroup = L.featureGroup(activeMarkers);
                map.fitBounds(activeGroup.getBounds(), { padding: [50, 50], maxZoom: 6 });
            }
        } catch (err) {
            console.error('[MAP] fitBounds error:', err);
        }
    }

    // Self-load doctors from the API so we don't depend on postMessage
    function loadDoctors() {
        fetch('/api/directory/search?q=&limit=200')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var doctors = data.doctors || [];
                console.log('[MAP] Loaded', doctors.length, 'doctors from API');
                var features = doctors
                    .filter(function(d) { return d.latitude && d.longitude && d.latitude !== 0 && d.longitude !== 0; })
                    .map(function(d) {
                        return {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [d.longitude, d.latitude] },
                            properties: {
                                cluster: false,
                                doctorId: d.id,
                                name: 'Dr. ' + (d.first_name || '') + ' ' + (d.last_name || ''),
                                slug: d.slug,
                                type: 'doctor',
                                isFiltered: true
                            }
                        };
                    });
                renderMarkers(features);
            })
            .catch(function(err) {
                console.error('[MAP] Failed to load doctors:', err);
            });
    }

    map.whenReady(function() {
        reportReady();
        loadDoctors();
    });

    // Also still listen for postMessage for filtered results
    window.addEventListener('message', function(e) {
        if (e.data.type === 'is-ready') {
            reportReady();
        } else if (e.data.type === 'force-raw-markers') {
            var features = e.data.data || [];
            if (features.length > 0) {
                renderMarkers(features);
            }
        } else if (e.data.type === 'set-view') {
            var center = e.data.center;
            var zoom = e.data.zoom;
            if (center && center[0] !== undefined) {
                map.setView([center[1], center[0]], zoom);
            }
        }
    });
</script>
</body>
</html>
