<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroChiro 8ft Backdrop — Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap');
  :root { --navy: #1E2D3B; --navy-dark: #15202B; --orange: #D66829; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #444; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: 'Lato', sans-serif; gap: 32px; }
  .print-note { background: white; border-radius: 12px; padding: 24px 32px; max-width: 700px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-size: 14px; line-height: 1.8; color: #333; }
  .print-note h3 { font-size: 18px; font-weight: 900; margin-bottom: 8px; color: var(--navy); }
  .print-note strong { color: var(--orange); }

  .backdrop {
    width: 672px; height: 623px;
    background: linear-gradient(175deg, var(--navy) 0%, var(--navy-dark) 100%);
    position: relative; overflow: hidden;
    box-shadow: 0 16px 60px rgba(0,0,0,0.4); border-radius: 4px;
    display: flex; flex-direction: column; align-items: center;
  }
  .accent-left { position: absolute; top: 8%; bottom: 8%; left: 0; width: 5px; background: var(--orange); border-radius: 0 3px 3px 0; z-index: 3; }
  .accent-right { position: absolute; top: 8%; bottom: 8%; right: 0; width: 5px; background: var(--orange); border-radius: 3px 0 0 3px; z-index: 3; }

  .top-section { display: flex; align-items: center; justify-content: center; gap: 16px; padding-top: 40px; position: relative; z-index: 2; }
  .top-section .logo { width: 64px; height: 64px; object-fit: contain; filter: brightness(0) invert(1); }
  .top-section .wordmark { font-size: 48px; font-weight: 900; color: white; letter-spacing: 4px; }
  .top-section .wordmark span { color: var(--orange); }
  .tagline { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.35); letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; position: relative; z-index: 2; }

  .map-container { flex: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; padding: 10px 30px 0; }
  .map-svg { width: 100%; max-width: 610px; height: auto; }

  .bottom-section { display: flex; align-items: center; justify-content: center; gap: 48px; padding-bottom: 36px; position: relative; z-index: 2; }
  .stat { text-align: center; }
  .stat-number { font-size: 28px; font-weight: 900; color: var(--orange); }
  .stat-label { font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
  .stat-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.1); }
  .bottom-url { font-size: 16px; font-weight: 900; color: rgba(255,255,255,0.4); letter-spacing: 1px; position: absolute; bottom: 16px; z-index: 2; }
  .bottom-url span { color: var(--orange); opacity: 0.7; }
</style>
</head>
